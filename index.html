        // Matrix Background
        const MatrixBackground = ({ opacity = 0.15, speed = 50, color = '#dc2626' }) => {
        const canvasRef = useRef(null);
        const [width, setWidth] = useState(window.innerWidth);
        const [height, setHeight] = useState(window.innerHeight);

        useEffect(() => {
            const handleResize = () => {
            setWidth(window.innerWidth);
            setHeight(window.innerHeight);
            };
            window.addEventListener('resize', handleResize);
            return () => window.removeEventListener('resize', handleResize);
        }, []);

        useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            canvas.width = width;
            canvas.height = height;

            const characters = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*{[<|>]}';
            const charArray = characters.split('');
            const fontSize = 14;
            const columns = Math.floor(width / fontSize);

            const drops = [];
            for (let i = 0; i < columns; i++) {
            drops[i] = 1;
            }

            let animationFrameId;
            let lastTime = 0;

            const draw = () => {
            ctx.fillStyle = `rgba(5, 5, 5, ${0.1})`; // Fade effect
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = color;
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                const isGlitch = Math.random() > 0.98;
                ctx.fillStyle = isGlitch ? '#ffffff' : color;
                ctx.fillText(text, x, y);
                ctx.fillStyle = color;

                if (y > height && Math.random() > 0.975) {
                drops[i] = 0;
                }

                drops[i]++;
            }
            };

            const animate = (timestamp) => {
                if (!lastTime) lastTime = timestamp;
                const elapsed = timestamp - lastTime;

                if (elapsed > speed) {
                    draw();
                    lastTime = timestamp;
                }

                animationFrameId = requestAnimationFrame(animate);
            };

            animate(0);

            return () => {
            cancelAnimationFrame(animationFrameId);
            };
        }, [width, height, opacity, speed, color]);

        return (
            <canvas 
            ref={canvasRef} 
            className="fixed top-0 left-0 z-0 pointer-events-none opacity-40 mix-blend-screen" 
            />
        );
